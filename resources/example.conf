# ----------------------------------------------------------------------
# Example Configuration
# ----------------------------------------------------------------------
# This file demonstrates every available configuration option across all
# components. Required fields are marked [required]. Optional fields are
# marked [optional] and show their default values.
# ----------------------------------------------------------------------

# [required] Name for the runner.
name = "example"

# [required] Number of clips to publish per run.
posts = 3

# [required] Directory for intermediate files during processing.
workDir = "/path/to/work"

# [optional] Concurrent preparation workers. (Default: 1)
preparationThreads = 2

# [optional] Concurrent publisher workers. (Default: 1)
publisherThreads = 2

# [optional] Consecutive failures before the run aborts. (Default: 3)
failureLimit = 5

# ----------------------------------------------------------------------
# Retrievers
# ----------------------------------------------------------------------
# At least one required. Each retriever fetches candidate clips from a
# platform. The optional pipeline field links the retriever to a named
# pipeline defined below.
# ----------------------------------------------------------------------

retrievers = [

  # Twitch retriever (by broadcaster/channel)
  {
    type          = "twitch"
    name          = "twitch_broadcaster"          # [required] Unique name for the retriever.
    clientId      = "<YOUR_TWITCH_CLIENT_ID>"     # [required] Twitch API client ID.
    token         = "<YOUR_TWITCH_BEARER_TOKEN>"  # [required] Twitch API bearer token.
    broadcasterId = "<BROADCASTER_ID>"            # [required] Twitch broadcaster/channel ID.
    window        = 24                            # [optional] Time to look back in hours. (Default: 24)
    limit         = 20                            # [optional] Max clips to fetch. (Default: 20)
    tags          = ["clips", "gaming"]           # [optional] Tags attached to clips for publishing. (Default: [])
    pipeline      = "pipeline_1"                  # [optional] Pipeline to run clips through. (Default: none)
  },

  # Twitch retriever (by game/category)
  {
    type      = "twitch"
    name      = "twitch_game"                 # [required] Unique name for the retriever.
    clientId  = "<YOUR_TWITCH_CLIENT_ID>"     # [required] Twitch API client ID.
    token     = "<YOUR_TWITCH_BEARER_TOKEN>"  # [required] Twitch API bearer token.
    gameId    = "<GAME_ID>"                   # [required] Twitch game/category ID.
    window    = 24                            # [optional] Time to look back in hours. (Default: 24)
    limit     = 20                            # [optional] Max clips to fetch. (Default: 20)
    languages = ["en"]                        # [optional] Language filter. (Default: [])
    tags      = ["clips", "gaming"]           # [optional] Tags attached to clips for publishing. (Default: [])
    pipeline  = "pipeline_2"                  # [optional] Pipeline to run clips through. (Default: none)
  }

]

# ----------------------------------------------------------------------
# History
# ----------------------------------------------------------------------
# Optional. The history tracks clips to prevent duplicates across runs.
# ----------------------------------------------------------------------

# SQLite history
history = {
  type         = "sqlite"
  name         = "sqlite"                    # [required] Name for the history.
  databasePath = "/path/to/clip-history.db"  # [required] Path to SQLite database file.
}

# ----------------------------------------------------------------------
# Downloader
# ----------------------------------------------------------------------
# Exactly one required. The downloader downloads each clip to a local
# file for processing.
# ----------------------------------------------------------------------

# yt-dlp downloader
downloader = {
  type      = "yt-dlp"
  name      = "yt-dlp"               # [required] Name for the downloader.
  ytDlpPath = "/path/to/yt-dlp"      # [required] Path to yt-dlp executable.
  timeout   = 180                    # [optional] Download process timeout in seconds. (Default: 180)
}

# ----------------------------------------------------------------------
# Pipelines
# ----------------------------------------------------------------------
# Optional. Each pipeline defines an ordered sequence of transformers
# applied to a clip.
# ----------------------------------------------------------------------

pipelines = [

  # Example pipeline 1
  {
    name = "pipeline_1"  # [required] Unique name for the pipeline.

    transformers = [

      # Frames per second transformer
      {
        type       = "fps"
        name       = "fps"              # [required] Name for the transformer.
        ffmpegPath = "/path/to/ffmpeg"  # [required] Path to FFmpeg executable.
        targetFps  = 30                 # [optional] Target frames per second. (Default: 30)
        timeout    = 180                # [optional] FFmpeg process timeout in seconds. (Default: 180)
      },

      # Music transformer
      {
        type       = "music"
        name       = "music"               # [required] Name for the transformer.
        ffmpegPath = "/path/to/ffmpeg"     # [required] Path to FFmpeg executable.
        musicPath  = "/path/to/music.mp3"  # [required] Path to audio file.
        mode       = "mix"                 # [optional] Audio mixing mode. (mix | replace) (Default: mix)
        volume     = 0.1                   # [optional] Music volume multiplier. (Default: 0.3)
        loop       = true                  # [optional] Loop music to match video length. (Default: true)
        timeout    = 180                   # [optional] FFmpeg process timeout in seconds. (Default: 180)
      },

      # Text transformer
      {
        type            = "text"
        name            = "text"               # [required] Name for the transformer.
        ffmpegPath      = "/path/to/ffmpeg"    # [required] Path to FFmpeg executable.
        fontPath        = "/path/to/font.ttf"  # [required] Path to font file.
        text            = "your text"          # [required] Text string to overlay.
        targetWidth     = 920                  # [required] Max text wrap width in pixels.
        position        = "bottom_center"      # [optional] Text anchor position. (top_left | top_right | bottom_left | bottom_right | top_center | bottom_center | center) (Default: center)
        textAlign       = "center"             # [optional] Text alignment. (left | center | right) (Default: center)
        fontColor       = "white"              # [optional] Text color. (Default: white)
        borderColor     = "black"              # [optional] Text border color. (Default: black)
        boxColor        = "black"              # [optional] Background box color. (Default: black)
        fontSize        = 60                   # [optional] Font size in points. (Default: 70)
        textOpacity     = 0.85                 # [optional] Text opacity. (0.0 – 1.0) (Default: 0.75)
        textBorderWidth = 3                    # [optional] Text border width in pixels. (Default: 3)
        textOffsetX     = 0                    # [optional] Horizontal text offset in pixels. (Default: 0)
        textOffsetY     = 0                    # [optional] Vertical text offset in pixels. (Default: 0)
        lineSpacing     = 10                   # [optional] Spacing between wrapped lines in pixels. (Default: 10)
        maxLines        = 4                    # [optional] Max lines before truncation. (Default: 4)
        boxOpacity      = 0.0                  # [optional] Background box opacity. (0.0 – 1.0) (Default: 0.0)
        boxBorderWidth  = 0                    # [optional] Background box border width in pixels. (Default: 0)
        timeout         = 180                  # [optional] FFmpeg process timeout in seconds. (Default: 180)
      },

      # Title transformer
      {
        type            = "title"
        name            = "title"              # [required] Name for the transformer.
        ffmpegPath      = "/path/to/ffmpeg"    # [required] Path to FFmpeg executable.
        fontPath        = "/path/to/font.ttf"  # [required] Path to font file.
        targetWidth     = 920                  # [required] Max text wrap width in pixels.
        position        = "bottom_center"      # [optional] Text anchor position. (top_left | top_right | bottom_left | bottom_right | top_center | bottom_center | center) (Default: center)
        textAlign       = "center"             # [optional] Text alignment. (left | center | right) (Default: center)
        fontColor       = "white"              # [optional] Text color. (Default: white)
        borderColor     = "black"              # [optional] Text border color. (Default: black)
        boxColor        = "black"              # [optional] Background box color. (Default: black)
        fontSize        = 60                   # [optional] Font size in points. (Default: 70)
        textOpacity     = 0.85                 # [optional] Text opacity. (0.0 – 1.0) (Default: 0.75)
        textBorderWidth = 3                    # [optional] Text border width in pixels. (Default: 3)
        textOffsetX     = 0                    # [optional] Horizontal text offset in pixels. (Default: 0)
        textOffsetY     = -1370                # [optional] Vertical text offset in pixels. (Default: 0)
        lineSpacing     = 10                   # [optional] Spacing between wrapped lines in pixels. (Default: 10)
        maxLines        = 4                    # [optional] Max lines before truncation. (Default: 4)
        boxOpacity      = 0.35                 # [optional] Background box opacity. (0.0 – 1.0) (Default: 0.0)
        boxBorderWidth  = 20                   # [optional] Background box border width in pixels. (Default: 0)
        timeout         = 180                  # [optional] FFmpeg process timeout in seconds. (Default: 180)
      },

      # Vertical blur transformer
      {
        type         = "vertical_blur"
        name         = "vertical_blur"    # [required] Name for the transformer.
        ffmpegPath   = "/path/to/ffmpeg"  # [required] Path to FFmpeg executable.
        targetWidth  = 1080               # [optional] Output width in pixels. (Default: 1080)
        targetHeight = 1920               # [optional] Output height in pixels. (Default: 1920)
        blurSigma    = 40.0               # [optional] Gaussian blur intensity. (Default: 40.0)
        blurSteps    = 2                  # [optional] Number of blur passes. (Default: 2)
        timeout      = 180                # [optional] FFmpeg process timeout in seconds. (Default: 180)
      },

      # Watermark transformer
      {
        type            = "watermark"
        name            = "watermark"             # [required] Name for the transformer.
        ffmpegPath      = "/path/to/ffmpeg"       # [required] Path to FFmpeg executable.
        fontPath        = "/path/to/font.ttf"     # [required] Path to font file.
        logoPath        = "/path/to/logo.png"     # [optional] Path to logo image file. (Default: none)
        position        = "lower_center"          # [optional] Text anchor position. (upper_center | lower_center | center) (Default: lower_center)
        fontColor       = "white"                 # [optional] Text color. (Default: white)
        borderColor     = "black"                 # [optional] Text border color. (Default: black)
        fontSize        = 70                      # [optional] Font size in points. (Default: 70)
        textOpacity     = 0.75                    # [optional] Text opacity. (0.0 – 1.0) (Default: 0.75)
        textBorderWidth = 3                       # [optional] Text border width in pixels. (Default: 3)
        textOffsetX     = 0                       # [optional] Horizontal text offset in pixels. (Default: 0)
        textOffsetY     = 15                      # [optional] Vertical text offset in pixels. (Default: 0)
        logoHeight      = 200                     # [optional] Logo height in pixels. (Default: 200)
        logoOpacity     = 0.3                     # [optional] Logo opacity. (0.0 – 1.0) (Default: 0.3)
        logoOffsetX     = 0                       # [optional] Horizontal logo offset in pixels. (Default: 0)
        logoOffsetY     = 0                       # [optional] Vertical logo offset in pixels. (Default: 0)
        timeout         = 180                     # [optional] FFmpeg process timeout in seconds. (Default: 180)
      }

    ]
  },

  # Example pipeline 2
  {
    name = "pipeline_2"  # [required] Unique name for the pipeline.

    transformers = [

      {
        type       = "fps"
        name       = "fps"
        ffmpegPath = "/path/to/ffmpeg"
        targetFps  = 30
      }

    ]
  }

]

# ----------------------------------------------------------------------
# Stager
# ----------------------------------------------------------------------
# Optional. The stager uploads processed clips to cloud storage for
# publishing.
# ----------------------------------------------------------------------

# Cloudflare R2 stager
stager = {
  type      = "cloudflare-r2"
  name      = "cloudflare_r2"                                 # [required] Unique name for the stager.
  accountId = "<YOUR_CLOUDFLARE_ACCOUNT_ID>"                  # [required] Cloudflare account ID.
  accessKey = "<YOUR_R2_ACCESS_KEY>"                          # [required] R2 access key.
  secretKey = "<YOUR_R2_SECRET_KEY>"                          # [required] R2 secret access key.
  bucket    = "<YOUR_BUCKET_NAME>"                            # [required] R2 bucket name.
  publicUrl = "https://<YOUR_SUBDOMAIN>.r2.dev"               # [required] Public base URL.
  directory = "clips"                                         # [optional] Object key prefix. (Default: none)
  region    = "auto"                                          # [optional] R2 region. (Default: auto)
  endpoint = "https://<ACCOUNT_ID>.r2.cloudflarestorage.com"  # [optional] Custom R2 endpoint. (Default: auto-derived)
}

