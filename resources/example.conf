# ----------------------------------------------------------------------
# Publishers
# ----------------------------------------------------------------------
# At least one required. Each publisher delivers processed clips to 
# social media platforms.
# ----------------------------------------------------------------------

publishers = [

  # Instagram publisher
  {
    type        = "instagram"
    name        = "instagram"                      # [required] Unique name for the publisher.
    accountId   = "<YOUR_INSTAGRAM_ACCOUNT_ID>"    # [required] Instagram business account ID.
    accessKey   = "<YOUR_INSTAGRAM_ACCESS_TOKEN>"  # [required] Instagram Graph API access token.
    captionText =                                  # [optional] Appended to the auto-generated caption. (Default: none)
"""
#YourHashtag #AnotherHashtag
"""
    timeout  = 180  # [optional] Container status check timeout in seconds. (Default: 180) 
    interval = 30   # [optional] Interval between status checks in seconds. (Default: 30)
  }

]
